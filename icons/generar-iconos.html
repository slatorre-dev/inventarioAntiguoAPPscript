<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Generar iconos PWA</title>
<style>
  body{font-family:sans-serif;padding:32px;background:#f4f6fb;color:#1a1d2e}
  h2{margin-bottom:8px}
  p{color:#6b7280;margin-bottom:24px}
  button{background:#2563eb;color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
  button:hover{background:#1d4ed8}
  #previews{display:flex;gap:24px;margin-top:28px;align-items:flex-end;flex-wrap:wrap}
  .prev-box{text-align:center;font-size:12px;color:#6b7280}
  canvas{display:block;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-bottom:6px}
  #status{margin-top:16px;font-size:13px;color:#059669;font-weight:600}
</style>
</head>
<body>
<h2>Generar iconos PWA</h2>
<p>Genera <code>icon-192.png</code> e <code>icon-512.png</code> a partir del favicon del proyecto.<br>
Guárdalos en esta misma carpeta <code>icons/</code>.</p>
<button onclick="generar()">⬇ Generar y descargar iconos</button>
<div id="status"></div>
<div id="previews"></div>

<script>
// SVG del favicon incrustado directamente para evitar restricciones file://
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#ffffff"/>
  <rect x="18" y="10" width="28" height="40" rx="4" fill="#0b2a4a"/>
  <rect x="22" y="16" width="20" height="2" fill="#ffffff"/>
  <rect x="22" y="22" width="16" height="2" fill="#ffffff"/>
  <rect x="22" y="28" width="18" height="2" fill="#ffffff"/>
  <path d="M24 20 l2 2 l4 -4" stroke="#4da3ff" stroke-width="2" fill="none"/>
  <path d="M24 26 l2 2 l4 -4" stroke="#4da3ff" stroke-width="2" fill="none"/>
  <rect x="34" y="34" width="16" height="12" rx="2" fill="#1e6fff"/>
  <polygon points="12,18 18,18 14,26 20,26 10,40 14,30 8,30" fill="#ff9900"/>
</svg>`;

const SVG_URL = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(SVG);

function renderIcon(size){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      resolve(canvas);
    };
    img.onerror = reject;
    img.src = SVG_URL;
  });
}

async function generar(){
  const status = document.getElementById('status');
  const previews = document.getElementById('previews');
  previews.innerHTML = '';
  status.textContent = 'Generando…';

  try {
    for(const size of [192, 512]){
      const canvas = await renderIcon(size);

      // Previsualización reducida
      const prev = document.createElement('canvas');
      const ps = Math.min(size, 128);
      prev.width = ps; prev.height = ps;
      prev.getContext('2d').drawImage(canvas, 0, 0, ps, ps);
      const box = document.createElement('div');
      box.className = 'prev-box';
      box.appendChild(prev);
      box.innerHTML += `<br>icon-${size}.png`;
      previews.appendChild(box);

      // Descargar
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    status.textContent = '✅ Iconos generados. Muévelos a la carpeta icons/ si el navegador los descargó en otra ubicación.';
  } catch(e) {
    status.style.color = '#dc2626';
    status.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
